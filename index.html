<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shrimp Parts Demo</title>
  <style>
    html, body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
    }
    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      gap: 12px;
      padding: 24px;
      box-sizing: border-box;
    }
    canvas {
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: transparent;
      max-width: min(92vw, 1100px);
      max-height: 70vh;
      width: auto;
      height: auto;
    }
    .meta {
      font-size: 14px;
      opacity: 0.8;
      text-align: center;
      line-height: 1.5;
    }
    .meta code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="view" width="900" height="500"></canvas>
    <div class="meta">
      body: tail amplitude 5° and gradually decreasing<br />
      legs: wave motion with phase offsets<br />
      mouths behind head / legs alternate behind-front / left hand behind, right hand front
    </div>
  </div>
  <script type="module" src="./app.js"></script>
</body>
</html>
